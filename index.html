<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Presentes — Olívia 1 ano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', -apple-system, sans-serif;
    background-color: #edf2e4;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='15' cy='18' rx='4' ry='7' fill='%234a5e2a' fill-opacity='0.07' transform='rotate(-25 15 18)'/%3E%3Cellipse cx='45' cy='48' rx='4' ry='7' fill='%234a5e2a' fill-opacity='0.07' transform='rotate(20 45 48)'/%3E%3C/svg%3E");
    color: #3d3520;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #4a5e2a;
    color: #fff;
    padding: 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: .5rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  /* ── Countdown pill ── */
  .countdown {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 999px;
    padding: .25rem .85rem;
    font-size: .88rem;
    font-weight: 600;
    color: #f5e8a0;
    margin-bottom: .6rem;
  }

  .countdown span {
    font-size: 1.1rem;
    font-weight: 800;
    color: #f0c040;
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    background: rgba(255,255,255,.15);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin-top: .4rem;
  }

  .progress-bar-fill {
    background: linear-gradient(90deg, #c9a02a, #e8c04a);
    height: 100%;
    border-radius: 999px;
    transition: width .4s ease;
  }

  .progress-label {
    font-size: .8rem;
    color: #c8d8b0;
    margin-top: .35rem;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    padding: 1.25rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── Cards ── */
  .card {
    background: #fdfaf2;
    border-radius: 16px;
    border: 2px solid transparent;
    box-shadow: 0 2px 6px rgba(74,94,42,.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: box-shadow .15s, border-color .15s, opacity .3s;
  }

  .card.bought { opacity: .55; }

  .card:hover {
    box-shadow: 0 6px 18px rgba(74,94,42,.18);
    border-color: #8aaa44;
  }

  .bought-overlay {
    position: absolute;
    inset: 0;
    background: rgba(106,122,42,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    pointer-events: none;
  }

  .bought-stamp {
    background: #4a5e2a;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: .8rem;
    font-weight: 800;
    padding: .35rem .85rem;
    border-radius: 999px;
    letter-spacing: .04em;
    transform: rotate(-8deg);
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    padding: .75rem;
    background: #f0f5e8;
  }

  .card-body {
    padding: .75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }

  .card-title {
    font-size: .85rem;
    font-weight: 600;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card.bought .card-title {
    text-decoration: line-through;
    color: #6b7280;
  }

  .card-price {
    font-size: .9rem;
    font-weight: 700;
    color: #b84637;
    margin-top: auto;
  }

  .card-price.empty {
    color: #9ca3af;
    font-weight: 400;
    font-size: .8rem;
  }

  .btn-buy {
    display: block;
    text-align: center;
    background: #c9a02a;
    color: #fff;
    font-weight: 700;
    font-size: .82rem;
    padding: .5rem;
    border-radius: 8px;
    text-decoration: none;
    margin-top: .4rem;
    transition: background .15s;
  }

  .btn-buy:hover { background: #b38f1e; }

  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: .4rem;
    margin-top: .3rem;
    cursor: pointer;
    font-size: .8rem;
    color: #4b5563;
    user-select: none;
  }

  .checkbox-wrap input[type=checkbox] {
    width: 15px;
    height: 15px;
    accent-color: #6a7a2a;
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-wrap.checked { color: #6a7a2a; font-weight: 700; }

  /* ── Setup banner ── */
  #setup-banner {
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 8px;
    padding: .9rem 1.2rem;
    margin: 1rem 1.25rem 0;
    font-size: .85rem;
    display: none;
  }

  #setup-banner a { color: #d97706; }

  #sync-status {
    font-size: .72rem;
    color: #9ca3af;
    margin-top: .2rem;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
    color: #6b7a4a;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .02em;
  }
</style>
</head>
<body>

<header>
  <h1>
    <svg width="30" height="30" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="14" cy="17" rx="10" ry="10" fill="#a8b890"/>
      <ellipse cx="14" cy="19.5" rx="6" ry="6.5" fill="#e8edd8"/>
      <path d="M11 17.5 Q14 16.5 17 17.5" stroke="#8a9870" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <path d="M10.5 20 Q14 19 17.5 20" stroke="#8a9870" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      <polygon points="7,9 5,2 11,8" fill="#a8b890"/>
      <polygon points="21,9 23,2 17,8" fill="#a8b890"/>
      <circle cx="11" cy="13" r="1.8" fill="#1a1a1a"/>
      <circle cx="17" cy="13" r="1.8" fill="#1a1a1a"/>
      <circle cx="11.6" cy="12.4" r=".65" fill="#fff"/>
      <circle cx="17.6" cy="12.4" r=".65" fill="#fff"/>
      <ellipse cx="14" cy="15.5" rx="1" ry=".6" fill="#8a9870"/>
    </svg>
    Lista de Presentes
  </h1>
  <div class="countdown" id="countdown"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">Carregando…</div>
  <div id="sync-status"></div>
</header>

<div id="setup-banner">
  ⚠️ <strong>Configuração necessária:</strong> Abra o arquivo <code>index.html</code> e preencha
  <code>JSONBIN_ID</code> e <code>JSONBIN_KEY</code> no início do script.
  Veja as instruções em <a href="https://jsonbin.io" target="_blank">jsonbin.io</a>.
</div>

<div class="grid" id="grid"></div>

<footer>🌿 Festa da Olívia &nbsp;·&nbsp; 13 de junho de 2026</footer>

<script src="data.js"></script>

<script>
// ─── CONFIGURE THESE TWO VALUES ──────────────────────────────────────────────
const JSONBIN_ID  = "69ead451856a682189680fbc";
const JSONBIN_KEY = "$2a$10$VG.TcvNXPd2UUjYjrkl3X.Nhk17XmG.N6BeX9Nx/5qixLfHzYfnSi";
// ─────────────────────────────────────────────────────────────────────────────

const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
const HEADERS = {
  "X-Master-Key": JSONBIN_KEY,
  "Content-Type": "application/json",
};

let boughtSet = new Set();
let syncPending = false;

// ── Fetch bought state ──────────────────────────────────────────────────────

async function loadBought() {
  if (!JSONBIN_ID || !JSONBIN_KEY) {
    document.getElementById("setup-banner").style.display = "block";
    return;
  }
  try {
    const res = await fetch(JSONBIN_URL + "/latest", { headers: HEADERS });
    const data = await res.json();
    boughtSet = new Set(data.record?.bought ?? []);
  } catch (e) {
    setSyncStatus("Erro ao carregar estado — verifique as chaves JSONBin.", "error");
  }
}

async function saveBought() {
  if (!JSONBIN_ID || !JSONBIN_KEY) return;
  syncPending = true;
  setSyncStatus("Salvando…");
  try {
    await fetch(JSONBIN_URL, {
      method: "PUT",
      headers: HEADERS,
      body: JSON.stringify({ bought: [...boughtSet] }),
    });
    setSyncStatus("Salvo ✓");
  } catch (e) {
    setSyncStatus("Erro ao salvar — tente novamente.", "error");
  } finally {
    syncPending = false;
  }
}

function setSyncStatus(msg, type = "ok") {
  const el = document.getElementById("sync-status");
  el.textContent = msg;
  el.style.color = type === "error" ? "#ef4444" : "#9ca3af";
}

// ── Render ──────────────────────────────────────────────────────────────────

function updateProgress() {
  const total = ITEMS.length;
  const done  = boughtSet.size;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent =
    `🌿 ${done} de ${total} itens já comprados`;
}

function makeBoughtOverlay() {
  const el = document.createElement("div");
  el.className = "bought-overlay";
  el.innerHTML = `<span class="bought-stamp">🌿 Já comprado!</span>`;
  return el;
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  ITEMS.forEach(item => {
    const bought = boughtSet.has(item.asin);
    const card = document.createElement("div");
    card.className = "card" + (bought ? " bought" : "");
    card.dataset.asin = item.asin;

    const img = item.image
      ? `<img class="card-img" src="${esc(item.image)}" alt="${esc(item.title)}" loading="lazy"
             onerror="this.src='https://m.media-amazon.com/images/G/01/wishlist/placeholder._CB544627345_.png'">`
      : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:#a8b890;font-size:2.5rem">🌿</div>`;

    const priceHtml = item.price
      ? `<div class="card-price">${esc(item.price)}</div>`
      : `<div class="card-price empty">Ver preço →</div>`;

    card.innerHTML = `
      ${img}
      <div class="card-body">
        <div class="card-title">${esc(item.title)}</div>
        ${priceHtml}
        <a class="btn-buy" href="${esc(item.affiliate_url)}" target="_blank" rel="noopener">
          Comprar na Amazon
        </a>
        <label class="checkbox-wrap${bought ? " checked" : ""}">
          <input type="checkbox" ${bought ? "checked" : ""} data-asin="${esc(item.asin)}">
          ${bought ? "✓ Já comprei!" : "Já comprei?"}
        </label>
      </div>`;

    if (bought) card.prepend(makeBoughtOverlay());
    card.querySelector("input[type=checkbox]").addEventListener("change", onToggle);
    grid.appendChild(card);
  });

  updateProgress();
}

function onToggle(e) {
  const asin = e.target.dataset.asin;
  if (e.target.checked) {
    boughtSet.add(asin);
  } else {
    boughtSet.delete(asin);
  }

  const card = e.target.closest(".card");
  card.classList.toggle("bought", e.target.checked);

  const existing = card.querySelector(".bought-overlay");
  if (e.target.checked && !existing) {
    card.prepend(makeBoughtOverlay());
  } else if (!e.target.checked && existing) {
    existing.remove();
  }

  const label = e.target.closest(".checkbox-wrap");
  label.classList.toggle("checked", e.target.checked);
  label.lastChild.textContent = e.target.checked ? " ✓ Já comprei!" : " Já comprei?";

  updateProgress();
  saveBought();
}

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Countdown ───────────────────────────────────────────────────────────────

function updateCountdown() {
  const party = new Date("2026-06-13T00:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = Math.round((party - today) / 86400000);
  const el = document.getElementById("countdown");
  if (diff > 0) {
    el.innerHTML = `🎉 Faltam <span>${diff}</span> dias para a festa!`;
  } else if (diff === 0) {
    el.innerHTML = `🎂 Hoje é o dia da festa!`;
  } else {
    el.style.display = "none";
  }
}

// ── Boot ────────────────────────────────────────────────────────────────────

(async function init() {
  if (typeof ITEMS === "undefined" || !ITEMS.length) {
    document.getElementById("grid").innerHTML =
      `<p style="padding:2rem;color:#6b7280">
        Nenhum item encontrado. Execute <code>scrape.py</code> primeiro para gerar <code>data.js</code>.
      </p>`;
    document.getElementById("progress-label").textContent = "Sem itens";
    return;
  }

  updateCountdown();
  await loadBought();
  renderGrid();
})();
</script>
</body>
</html>
